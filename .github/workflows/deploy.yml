name: Deploy
on:
  push:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: "--no-deprecation"
concurrency:
  group: deploy-main
  cancel-in-progress: true
jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Inject D1 database_id from secret
        run: |
          if [ -z "${D1_DATABASE_ID:-}" ]; then
            echo "::error::D1_DATABASE_ID secret is not set" >&2
            exit 1
          fi
          # Deterministic JSON mutation: only `.d1_databases[0].database_id` is touched.
          # Avoids regex pitfalls of sed (escape, multi-occurrence) per peer review (Gemini, session b8a27611).
          jq --arg id "$D1_DATABASE_ID" '.d1_databases[0].database_id = $id' wrangler.json > wrangler.json.tmp
          mv wrangler.json.tmp wrangler.json
          # Post-mutation verification
          grep -q "$D1_DATABASE_ID" wrangler.json || { echo "::error::Substitution failed: real ID not in file" >&2; exit 1; }
          if grep -q "00000000-0000-0000-0000-000000000000" wrangler.json; then
            echo "::error::Placeholder still present after mutation" >&2
            exit 1
          fi
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
      - name: Deploy Worker
        run: npx --no-install wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets['CLOUDFLARE_API_TOKEN'] }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets['CLOUDFLARE_ACCOUNT_ID'] }}
    timeout-minutes: 30
permissions:
  contents: read
